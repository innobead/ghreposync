name: ghreposync
description: Sync GitHub repository resources between repos
author: innobead

inputs:
  source:
    description: Source repository in owner/repo format
    required: true
  target:
    description: Target repository in owner/repo format
    required: true
  resource:
    description: >
      Comma-separated list of resources to sync, or 'all'.
      Supported values: all, labels
    required: false
    default: all
  dry-run:
    description: Preview changes without applying them
    required: false
    default: 'false'
  token:
    description: GitHub token with access to both source and target repos
    required: true
  version:
    description: ghreposync release version to download (e.g. v0.1.0), or 'latest'
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)  TRIPLE="x86_64-unknown-linux-musl" ;;
          Darwin-x86_64) TRIPLE="x86_64-apple-darwin" ;;
          Darwin-arm64)  TRIPLE="aarch64-apple-darwin" ;;
          *) echo "Unsupported platform: $OS-$ARCH"; exit 1 ;;
        esac
        echo "triple=$TRIPLE" >> "$GITHUB_OUTPUT"

    - name: Download binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        VERSION="${{ inputs.version }}"
        TRIPLE="${{ steps.platform.outputs.triple }}"
        DEST="$RUNNER_TEMP/ghreposync"

        ARGS=(
          release download
          --repo innobead/ghreposync
          --pattern "ghreposync-${TRIPLE}"
          --output "$DEST"
          --clobber
        )
        if [ "$VERSION" != "latest" ]; then
          ARGS+=("$VERSION")
        fi

        gh "${ARGS[@]}"
        chmod +x "$DEST"

    - name: Run ghreposync
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        ARGS=(
          sync
          --source "${{ inputs.source }}"
          --target "${{ inputs.target }}"
          --resource "${{ inputs.resource }}"
        )
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          ARGS+=(--dry-run)
        fi
        "$RUNNER_TEMP/ghreposync" "${ARGS[@]}"