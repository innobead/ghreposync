name: Action test

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: ghreposync version to test (e.g. v0.1.0), or 'latest'
        required: false
        default: latest

permissions:
  issues: write

jobs:
  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Sync labels (dry run)
        uses: ./
        with:
          source: innobead/ghreposync
          target: innobead/ghreposync
          resource: labels,milestones
          dry-run: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version || 'latest' }}